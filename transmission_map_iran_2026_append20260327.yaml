iran_2026_extended_stalemate:
  description: >
    No deal before 6 Apr; Trump rolls the deadline repeatedly while limited military
    operations continue; Hormuz stays at 10–20% normal throughput under Iran's selective-
    access policy. Brent drifts up to $112–118 as storage draws accelerate and OECD
    inventories fall to crisis lows. The stagflation channel dominates — elevated oil
    and gas prices simultaneously suppress growth and prevent Fed easing. Gold falls
    modestly as USD strength and real-yield headwinds outweigh safe-haven demand in
    a grinding rather than acute shock. USD strengthens as a stagflation hedge; JPY
    faces competing forces (safe-haven bid vs oil-import vulnerability).
  primary_risk_factors:
    - Brent Crude (CB)
    - TTF Nat Gas (TTF)
  causal_chain:
    - step: 1
      mechanism: Deadline rolled to April 6 — stalemate confirmed, no near-term Hormuz resolution
