      affects:
        - Brent Crude (CB)
        - ICE Gasoil (QS)
        - ULSD Heating Oil (HO)
    - step: 3
      mechanism: Stagflation channel — elevated energy costs compress corporate margins, slow growth
      affects:
        - S&P 500 (ES)
        - Euro STOXX 50 (FESX)
        - DAX 40 (FDAX)
        - Nikkei 225 (NK)
    - step: 4
      mechanism: Fed-on-hold confirmed — hawkish repricing; 50% chance of hike by Dec 2026
      affects:
        - US 10Y Yield (ZN)
        - SOFR3M
        - NASDAQ
    - step: 5
      mechanism: USD stagflation hedge strengthens — petrocurrencies diverge (CAD/NOK outperform)
