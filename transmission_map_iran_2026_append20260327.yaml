    path (markets reprice 2–3 cuts in 2026), boosting risk assets broadly. EM relief
    rally is partial — oil-importers (India, Japan) benefit most; Qatari LNG structural
    damage caps TTF recovery at €35–40/MWh, preventing full reversion to pre-war
