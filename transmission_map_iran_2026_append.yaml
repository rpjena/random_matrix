iran_2026_full_escalation:
  description: >
    US executes power-plant strike threat; Iran responds with Hormuz mining and
    sustained attacks on Gulf energy infrastructure (Aramco terminals, UAE LNG
    hubs, Qatar North Field residual capacity). The Saudi East-West pipeline
    (1–1.5 mb/d) is the only alternative routing for Gulf crude — wholly
    insufficient vs 20 mb/d through Hormuz. This is the largest oil supply shock
    in recorded history becoming systemic. Four simultaneous transmission channels
    overwhelm offsetting forces: (1) extreme energy shock — Brent $150–200,
    TTF €100–130; (2) stagflation trap — Fed cannot cut (inflation 4%+) or
    hike (demand destruction); (3) EM sovereign cascade — India, Turkey, Pakistan
    near BoP crisis; (4) demand destruction — recession probability >70% per
    Oxford Economics at $140+ oil for two months. Gold finally moves decisively
    as geopolitical/stagflation channel overwhelms USD competition. US 10Y yield
    direction remains ambiguous — extreme inflation (up) and demand destruction
    (down) compete at unprecedented magnitudes.
  primary_risk_factors:
  - Brent Crude (CB)
  - TTF Nat Gas (TTF)
  - VIX (vol pts)
  causal_chain:
  - step: 1
    mechanism: US strikes Iranian power grid → Iran mines Hormuz + attacks Gulf
      energy infrastructure; Brent surges from $112 toward $150–200; Saudi East-West
      pipeline (1.5 mb/d) cannot replace 20 mb/d; Dallas Fed model implies
      −2.9pp annualised Q2 GDP
    affects:
    - Brent Crude (CB)
    - WTI Crude (CL)
    - Dubai Crude (DC)
    - OVX Oil Vol (vol pts)
  - step: 2
    mechanism: Products spike faster than crude as refinery feedstock cost
      surges and ME product exports terminate; potential diesel rationing in
      major import economies
    affects:
    - RBOB Gasoline (RB)
    - ULSD Heating Oil (HO)
    - ICE Gasoil (QS)
  - step: 3
    mechanism: Remaining Qatar LNG capacity damaged; TTF spikes to €100–130;
      Goldman estimate for >2-month full closure; European storage crisis
      becomes acute; industrial rationing begins in Germany
    affects:
    - TTF Nat Gas (TTF)
  - step: 4
    mechanism: Flight-to-quality overwhelms inflation channel for gold; stagflation
      + potential regime change + EM cascade finally tilts gold decisively up;
      target $5,700 from $5,050 current
    affects:
    - Gold (GC)
    - USD Index DXY
    - USD/JPY (6J)
  - step: 5
    mechanism: Severe equity crash — stagflation trap + recession pricing + forced
      de-risking; S&P targets −24% from current; VIX approaches financial-crisis
      levels 40–55
    affects:
    - S&P 500 (ES)
    - Euro STOXX 50 (FESX)
    - DAX 40 (FDAX)
    - Nikkei 225 (NK)
    - VIX (vol pts)
    - VSTOXX (vol pts)
  - step: 6
    mechanism: EM sovereign cascade — India, Turkey, South Korea near BoP crisis;
      EMBI spreads widen dramatically; potential IMF emergency facilities required
    affects:
    - USD/INR (INR)
    - EMBI Sovereign Spread
  - step: 7
    mechanism: US 10Y yield — demand destruction (down) and extreme inflation (up)
      compete at unprecedented magnitudes; net direction ambiguous; central bank
      paralysis
    affects:
    - US 10Y Yield (ZN)
