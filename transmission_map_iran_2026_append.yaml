      liquidity void in flash move toward $72-82 structural floor; OVX collapses
    affects:
    - Brent Crude (CB)
    - WTI Crude (CL)
    - Dubai Crude (DC)
    - OVX Oil Vol (vol pts)
  - step: 2
    mechanism: Products follow crude down; crack spreads normalise from elevated
      levels; US gasoline below $3.50/gal retail within weeks
    affects:
    - RBOB Gasoline (RB)
    - ULSD Heating Oil (HO)
    - ICE Gasoil (QS)
  - step: 3
    mechanism: Qatar LNG partial flow resumes but 17% capacity permanently offline;
      TTF falls from ~$60 but structural floor ~$38-45 persists — does not revert
      to pre-war $33
    affects:
    - TTF Nat Gas (TTF)
  - step: 4
    mechanism: Risk-on relief — equity indices rally, VIX normalises; USD safe-haven
      deflates; Fed cut cycle expected to resume by June
    affects:
    - S&P 500 (ES)
    - Euro STOXX 50 (FESX)
    - DAX 40 (FDAX)
    - Nikkei 225 (NK)
