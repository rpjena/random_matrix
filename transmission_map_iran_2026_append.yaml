iran_2026_extended_stalemate:
  description: >
    No ceasefire before approximately June 2026. US Navy establishes partial
    escort corridors — Hormuz ~10% open but not normalised. Oil compounds on
    two interacting mechanisms: (1) Hormuz physical blockade ongoing; (2) Gulf
    storage filling as production curtailments begin (~April 5–15, Iraq/Kuwait).
    The stalemate is NOT a plateau — it is an actively worsening supply picture.
    Iranian oil sanctions waiver expires April 19, removing one partial offset.
    European summer gas refill season (April–September) cannot proceed normally
    with Hormuz closed, driving TTF toward Goldman's €80–100 estimate for a
    one-month full closure. Stagflation channel dominates: higher energy costs
    → higher CPI → Fed on hold → USD sustained → gold range-bound (competing
    forces still balanced). Dallas Fed model: −2.9pp annualised Q2 GDP.
  primary_risk_factors:
  - Brent Crude (CB)
  - TTF Nat Gas (TTF)
  - OVX Oil Vol (vol pts)
  causal_chain:
  - step: 1
    mechanism: Hormuz remains ~10% open; Navy escort corridors insufficient →
      Brent/WTI grind higher from $112/$107 current toward $120–140/$115–135
      as the market's two-week hard deadline (~Apr 5) is breached
    affects:
    - Brent Crude (CB)
    - WTI Crude (CL)
    - Dubai Crude (DC)
    - OVX Oil Vol (vol pts)
  - step: 2
    mechanism: Gulf storage fills by ~Apr 5–15 → Iraq and Kuwait enforce compulsory
      production shutdowns → supply destruction compounds Hormuz effect; different
      from a shipping blockade — harder to reverse
    affects:
    - Brent Crude (CB)
    - WTI Crude (CL)
    - Dubai Crude (DC)
  - step: 3
    mechanism: Crude up → products follow via cost pass-through; diesel crack spreads
      maintain elevated levels as ME distillate exports remain disrupted
    affects:
    - RBOB Gasoline (RB)
    - ULSD Heating Oil (HO)
    - ICE Gasoil (QS)
  - step: 4
    mechanism: European summer gas refill season (Apr–Sep) cannot access Qatari LNG
      via Hormuz; storage at 30% cannot be refilled → TTF spikes toward €80–100
    affects:
    - TTF Nat Gas (TTF)
  - step: 5
    mechanism: Oil inflation → CPI → Fed on hold (Goldman first cut pushed to Sep);
      USD sustained by dual support; breakevens rise; nominal yields rise modestly
    affects:
    - USD Index DXY
    - US 10Y Yield (ZN)
  - step: 6
    mechanism: Stagflation drag → equities grind lower over 4–6 weeks; energy sector
      bifurcation widens (XLE up; airlines, industrials down)
    affects:
    - S&P 500 (ES)
    - Euro STOXX 50 (FESX)
    - DAX 40 (FDAX)
    - Nikkei 225 (NK)
    - S&P Energy Sector (XLE)
    - VIX (vol pts)
  - step: 7
    mechanism: EM oil importers face sustained CA deterioration as oil bill stays
      elevated; lagged FX and spread widening accelerates in weeks 3–4
    affects:
    - USD/INR (INR)
    - EMBI Sovereign Spread
  - step: 8
    mechanism: "Safe-haven FX divergence — JPY and CHF bid; petrocurrencies (NOK, CAD)
      benefit from oil but USD safe-haven partially offsets"
    affects:
    - USD/JPY (6J)
    - USD/NOK (NOK)
    - USD/CAD (6C)
    - EUR/USD (6E)
  instruments:
    Brent Crude (CB):
      tier: 1
      direction: +
      mechanism: Ongoing Hormuz closure + Gulf production curtailments compound;
        market hard deadline (~Apr 5) breach triggers another leg; target $120–140
        from $112 current
      prior_mean: 16.0
      prior_strength: tight
    WTI Crude (CL):
      tier: 1
      direction: +
      mechanism: Follows Brent; US producers benefit from higher prices; not Hormuz-
        exposed operationally; target $115–135 from $107 current
      prior_mean: 17.0
      prior_strength: tight
    Dubai Crude (DC):
      tier: 1
      direction: +
      mechanism: ME benchmark; Asian buyers unable to access Hormuz routing; spot
        premiums widen further
      prior_mean: 15.0
      prior_strength: tight
    TTF Nat Gas (TTF):
      tier: 1
      direction: +
      mechanism: European summer refill season blocked; storage at 30% cannot be
        replenished via Hormuz; Goldman estimate €80–100 for one-month full closure;
        target +45% from current €62
      prior_mean: 45.0
