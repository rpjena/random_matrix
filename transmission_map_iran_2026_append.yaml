        rate differential narrows; USD falls from 105.5 current
      prior_mean: -2.8
      prior_strength: moderate
    EUR/USD (6E):
      tier: 2
      direction: +
      mechanism: EUR recovers as ECB resumes cutting cycle; European energy import
        bill falls; current account relief
      prior_mean: 2.9
      prior_strength: moderate
    USD/JPY (6J):
      tier: 2
      direction: +
      mechanism: Risk-on unwinds JPY safe-haven; Japan oil import relief; JPY
        weakens → USD/JPY rises from 149 current
      prior_mean: 2.7
      prior_strength: moderate
    USD/NOK (NOK):
      tier: 2
      direction: +
      mechanism: Oil falls → Norway terms of trade deteriorate → NOK weakens →
        USD/NOK rises; reversal of petrocurrency benefit
      prior_mean: 2.8
      prior_strength: moderate
    USD/CAD (6C):
      tier: 2
      direction: +
      mechanism: Oil falls → CAD loses commodity premium → weakens → USD/CAD rises;
        weaker effect than NOK given broader Canadian economy
      prior_mean: 2.1
