iran_2026_rapid_resolution:
  description: >
    Ceasefire or back-channel deal reopens the Strait of Hormuz by approximately
    April 5–12. Oil supply shock reverses sharply as tanker traffic resumes.
    Risk premium deflates across energy and geopolitical assets; Fed resumes
    rate-cut cycle. Critical caveat: Qatar LNG capacity is 17% permanently offline
    (3–5yr repair per QatarEnergy), creating a structural floor on both TTF
    (€40–50) and Brent (above the pre-war Goldman fair value of $65) that prevents
    a full reversion to pre-war levels. The primary transmission in this scenario
    runs in reverse: oil down → products down → petrocurrencies weaken → risk
    assets rally → USD safe-haven deflates → Fed cuts resume.
  primary_risk_factors:
  - Brent Crude (CB)
  - TTF Nat Gas (TTF)
  causal_chain:
  - step: 1
    mechanism: Hormuz reopens → tanker traffic resumes → Brent/WTI fall sharply
      from $112/$107 current levels toward $75–85/$70–80 structural floor
    affects:
    - Brent Crude (CB)
    - WTI Crude (CL)
    - Dubai Crude (DC)
    - OVX Oil Vol (vol pts)
  - step: 2
    mechanism: Crude falls → refinery feedstock costs fall → products follow with
      lag; crack spreads normalise from elevated levels
    affects:
    - RBOB Gasoline (RB)
    - ULSD Heating Oil (HO)
    - ICE Gasoil (QS)
  - step: 3
    mechanism: Partial Qatar LNG flow resumes but 17% capacity permanently offline
      → TTF falls from €62 but structural floor ~€40–50 prevents full reversion
    affects:
    - TTF Nat Gas (TTF)
  - step: 4
    mechanism: Oil falls → petrocurrency petrocurrencies (NOK, CAD) lose oil premium
      → USD/NOK and USD/CAD rise
    affects:
    - USD/NOK (NOK)
    - USD/CAD (6C)
  - step: 5
    mechanism: Risk-on relief rally — geopolitical risk premium deflates → equities
      rally, VIX normalises, USD safe-haven bid reverses
    affects:
    - S&P 500 (ES)
    - Euro STOXX 50 (FESX)
    - DAX 40 (FDAX)
    - Nikkei 225 (NK)
    - VIX (vol pts)
    - VSTOXX (vol pts)
    - USD Index DXY
  - step: 6
    mechanism: Inflation expectations fall as oil shock reverses → Fed cut cycle
      resumes (first cut returns to June timeline) → US yields fall; EUR recovers
      as ECB also resumes
    affects:
    - US 10Y Yield (ZN)
    - EUR/USD (6E)
    - USD/JPY (6J)
  - step: 7
    mechanism: EM oil importers get current account relief → INR, TRY, KRW recover;
      EMBI spreads tighten on reduced BoP stress
    affects:
    - USD/INR (INR)
    - EMBI Sovereign Spread
  - step: 8
    mechanism: Oil falls sharply → US HY energy issuers see revenue compression →
      HY E&P spreads WIDEN from currently compressed levels back toward pre-war
    affects:
    - HY E&P Credit Spread
    - S&P Energy Sector (XLE)
  instruments:
    Brent Crude (CB):
      tier: 1
      direction: '-'
      mechanism: Direct — Hormuz reopening restores ~20 mb/d; Brent falls from $112
        current; structural floor ~$75–85 due to infrastructure damage risk premium
      prior_mean: -29.0
      prior_strength: tight
    WTI Crude (CL):
      tier: 1
      direction: '-'
      mechanism: Follows Brent on resolution; US net exporter less affected but
        globally repriced; falls from $107 current
      prior_mean: -30.0
      prior_strength: tight
    Dubai Crude (DC):
      tier: 1
      direction: '-'
      mechanism: ME benchmark reprices immediately on Hormuz reopening; Asian buyers
        return to Hormuz routing
      prior_mean: -28.0
      prior_strength: tight
    TTF Nat Gas (TTF):
      tier: 1
      direction: '-'
      mechanism: Partial Qatari LNG flow resumes but 17% capacity permanently offline
        (3–5yr repair) → TTF falls from €62 but cannot revert to pre-war €33;
        structural floor ~€40–50
      prior_mean: -27.0
      prior_strength: moderate
    RBOB Gasoline (RB):
      tier: 2
      direction: '-'
      mechanism: Crude falls → feedstock cost falls → RBOB follows with 1–2 day lag;
        crack spreads normalise
      prior_mean: -21.0
      prior_strength: moderate
    ULSD Heating Oil (HO):
      tier: 2
      direction: '-'
      mechanism: Crude falls; ME distillate exports resume → global diesel tightness
        resolves; ULSD falls from elevated levels
      prior_mean: -25.0
      prior_strength: moderate
    ICE Gasoil (QS):
      tier: 2
      direction: '-'
      mechanism: European diesel benchmark; tracks HO lower; ME gasoil flows resume
      prior_mean: -24.0
      prior_strength: moderate
    OVX Oil Vol (vol pts):
      tier: 1
      direction: '-'
      mechanism: Hormuz binary risk resolves → oil vol collapses from ~45 current
        toward ~20–22; fastest-moving asset on resolution news
      prior_mean: -23.0
      prior_strength: tight
    S&P 500 (ES):
      tier: 2
      direction: +
      mechanism: Relief rally — geopolitical risk premium deflates; Fed cut cycle
        resumes; energy cost drag reverses; S&P target +6% from current 6,560
      prior_mean: 6.0
      prior_strength: moderate
    VIX (vol pts):
      tier: 2
      direction: '-'
      mechanism: Geopolitical uncertainty resolves → VIX normalises from ~24 to
        ~18; rapid move given non-financial nature of crisis
      prior_mean: -6.0
      prior_strength: tight
    Euro STOXX 50 (FESX):
