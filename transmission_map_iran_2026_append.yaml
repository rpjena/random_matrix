    rehabilitation post-ceasefire; (2) Qatar LNG 17% capacity offline for 3-5 years;
    (3) Gulf infrastructure damage premium. The $90-95 liquidity void means a ceasefire
    confirmation could produce a flash -$15 correction within one session before
    stabilising at the structural floor. Markets have already priced ~$12 of relief
    (Brent $112 to $100); a confirmed deal adds another $18-28 of downside.
